<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竖排文字</title>
    <!-- 使用可靠的 CDN，并添加备用逻辑 -->
    <script src="https://cdn.jsdelivr.net/npm/jschardet@3.0.0/dist/jschardet.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: #f5f3f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 20px; }
        .card { max-width: 1200px; width: 100%; background: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.05); padding: 32px 36px; }
        h2 { font-weight: 400; font-size: 1.9rem; letter-spacing: 1px; margin: 0 0 8px 0; color: #2e2a24; border-left: 6px solid #b7a48b; padding-left: 20px; }
        .sub { color: #5f5b55; margin: 0 0 32px 0; font-size: 1rem; padding-left: 26px; }
        .input-area { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .field-row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; }
        .field { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .field label { font-weight: 500; color: #3b362f; min-width: 90px; }
        .field input, .field textarea, .field select { padding: 10px 16px; border: 1px solid #d9d2c9; border-radius: 40px; font-size: 1rem; background: #fefcf9; transition: 0.15s; }
        .field textarea { border-radius: 24px; resize: vertical; min-height: 100px; width: 100%; max-width: 600px; line-height: 1.6; }
        .field input[type="number"] { width: 100px; }
        .field input:focus, .field textarea:focus { outline: none; border-color: #b7a48b; box-shadow: 0 0 0 3px rgba(183,164,139,0.2); }
        .file-area { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin: 10px 0 5px; }
        .file-label { background: #edeae5; padding: 10px 24px; border-radius: 50px; cursor: pointer; font-weight: 500; border: 1px solid #d9d2c9; }
        .file-label:hover { background: #e2dbd2; }
        #file-info { color: #6b6258; font-size: 0.9rem; }
        .button-group { display: flex; gap: 16px; flex-wrap: wrap; margin: 20px 0 10px; justify-content: flex-end; }
        button { background: #ffffff; border: 1.5px solid #c6b7a8; padding: 10px 28px; border-radius: 50px; font-size: 1rem; font-weight: 500; color: #3e3730; cursor: pointer; transition: 0.1s ease; }
        button.primary { background: #3e3730; border-color: #3e3730; color: white; }
        button.primary:hover { background: #5c5349; border-color: #5c5349; }
        button:hover { background: #f0ebe6; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-bar { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin: 30px 0 20px; background: #f5f3f0; padding: 12px 24px; border-radius: 60px; }
        .page-info { font-size: 1.2rem; font-weight: 500; color: #2e2a24; }
        .page-nav { display: flex; gap: 8px; }
        .page-nav button { padding: 6px 18px; border-radius: 40px; background: white; border: 1px solid #b7a48b; }
        .page-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
        .output-header { display: flex; justify-content: space-between; align-items: baseline; margin: 20px 0 16px 0; border-bottom: 2px dashed #d9d2c9; padding-bottom: 8px; }
        .output-header h3 { font-weight: 400; font-size: 1.4rem; margin: 0; color: #2e2a24; }
        .vertical-output { background: #fefcf9; border: 1px solid #e2dbd2; border-radius: 24px; padding: 24px 20px; overflow-x: auto; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .columns-container { display: flex; flex-direction: row-reverse; justify-content: flex-start; gap: 0; }
        .column { display: flex; flex-direction: column; align-items: center; border-right: 3px solid #c6b7a8; padding: 0 10px; min-width: 2.5em; }
        .column:last-child { border-left: 3px solid #c6b7a8; }
        .cell { font-size: 1.8rem; line-height: 2.2rem; font-family: 'Courier New', monospace; white-space: nowrap; text-align: center; padding: 0 0.2em; }
        .footnote { margin-top: 24px; font-size: 0.9rem; color: #7a7168; background: #f5f3f0; padding: 14px 22px; border-radius: 40px; }
        .error-message { color: #b34a4a; background: #ffe6e6; padding: 8px 16px; border-radius: 40px; margin: 10px 0; }
        .loading-message { color: #2e6b2e; background: #e6ffe6; padding: 8px 16px; border-radius: 40px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>❚ 竖排文字</h2>
    <div class="sub">每个句子独立成一列，高度自动适应句子长度。导入 .txt 文件时自动检测编码，崩溃已修复。</div>

    <!-- 文件上传区（无编码选择，自动检测） -->
    <div class="file-area">
        <span style="font-weight:500;">📂 导入 .txt：</span>
        <input type="file" id="fileInput" accept=".txt, text/plain" style="display:none;">
        <label for="fileInput" class="file-label">选择文件</label>
        <span id="file-info">未选择文件</span>
        <button id="clearFileBtn" style="padding:6px 20px;">× 清除</button>
        <label style="margin-left:12px; color:#5f5b55;">编码：</label>
        <select id="encodingSelect" style="padding:6px 12px; border-radius:20px; border:1px solid #d9d2c9; background:#fefcf9;">
            <option value="auto">自动</option>
            <option value="gb18030">GB18030</option>
            <option value="utf-8">UTF-8</option>
            <option value="big5">Big5</option>
        </select>
    </div>
    <div id="fileError" class="error-message" style="display: none;"></div>
    <div id="loadingMsg" class="loading-message" style="display: none;">⏳ 正在解码文件，请稍候...</div>

    <!-- 文本输入 / 设置 -->
    <div class="input-area">
        <div class="field-row">
            <div class="field">
                <label>🧮 每页列数</label>
                <input type="number" id="colsPerPage" min="1" value="18" step="1">
            </div>
            <div class="checkbox-group" style="background: #f5f3f0; padding: 8px 20px; border-radius: 50px;">
                <input type="checkbox" id="paragraphMode" checked>
                <label for="paragraphMode" style="min-width:auto;">📄 按段落分列（空行分隔）</label>
                <span style="margin-left: 20px; font-size:0.9rem; color:#5f5b55;">|</span>
                <input type="checkbox" id="punctMode" style="margin-left: 20px;">
                <label for="punctMode" style="min-width:auto;">🔖 按标点分列（逗号、句号等）</label>
            </div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="button-group">
        <button id="convertBtn" class="primary">⟳ 重新排版</button>
        <button id="exampleBtn">↺ 还原示例</button>
    </div>

    <!-- 分页导航 -->
    <div id="pagination" class="pagination-bar" style="display: none;">
        <div class="page-info">
            <span id="currentPageDisplay">1</span> / <span id="totalPagesDisplay">1</span> 页
        </div>
        <div class="page-nav">
            <button id="prevPage" disabled>◀ 上一页</button>
            <button id="nextPage" disabled>下一页 ▶</button>
        </div>
        <div style="margin-left: auto; color:#5f5b55;">
            <span id="pageStats"></span>
        </div>
    </div>

    <!-- 输出区域：显示当前页的列 -->
    <div class="output-header">
        <h3>⏚ 当前页竖排（列从右向左）</h3>
        <span id="currentPageInfo" class="info"></span>
    </div>
    <div id="outputDiv" class="vertical-output">
        <div style="padding: 30px; text-align: center; color: #aaa;">点击转换按钮预览</div>
    </div>

    <div class="footnote">
        <strong>⏍ 阅读顺序：</strong> 每页内从最右边一列 <strong>从上到下</strong> 读，然后向左移动。 
        每列高度完全由句子实际字数决定，底部没有多余空行。列之间的竖线为分隔线。
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('file-info');
        const fileError = document.getElementById('fileError');
        const loadingMsg = document.getElementById('loadingMsg');
        const clearFileBtn = document.getElementById('clearFileBtn');

        // 全局隐藏文本存储变量
        let storedText = '北国风光，千里冰封，万里雪飘。';
        
        function getInputText() {
            return storedText;
        }
        function setInputText(s) {
            storedText = s;
        }
        const colsPerPageInput = document.getElementById('colsPerPage');
        const punctModeCheck = document.getElementById('punctMode');
        const convertBtn = document.getElementById('convertBtn');
        const exampleBtn = document.getElementById('exampleBtn');
        const outputDiv = document.getElementById('outputDiv');
        const paginationDiv = document.getElementById('pagination');
        const currentPageSpan = document.getElementById('currentPageDisplay');
        const totalPagesSpan = document.getElementById('totalPagesDisplay');
        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');
        const paragraphModeCheck = document.getElementById('paragraphMode');
        const currentPageInfo = document.getElementById('currentPageInfo');
        const pageStats = document.getElementById('pageStats');

        // 示例数据
        const EXAMPLE_TEXT = `沁园春·雪 

作者：毛泽东

北国风光，千里冰封，万里雪飘。

望长城内外，惟余莽莽；大河上下，顿失滔滔。

山舞银蛇，原驰蜡象，欲与天公试比高。

须晴日，看红装素裹，分外妖娆。

江山如此多娇，引无数英雄竞折腰。

惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。

一代天骄，成吉思汗，只识弯弓射大雕。

俱往矣，数风流人物，还看今朝。`;
        const EXAMPLE_COLS_PER_PAGE = 18;
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB 限制

        // 全局存储分页数据
        let pages = [];
        let currentPage = 0;

        // 按标点分割函数（保留标点）
        function splitByParagraph(text) {
            const paragraphs = text.split(/\n\n+|\r\n\r\n+/)
                .map(p => p.trim())
                .filter(p => p.length > 0);
            return paragraphs;
        }

        function splitByPunctuation(text) {
            const regex = /[，。！？]+/g;
            let result = [];
            let lastIndex = 0;
            let match;
            while ((match = regex.exec(text)) !== null) {
                const endIdx = match.index + match[0].length;
                const segment = text.substring(lastIndex, endIdx).trim();
                if (segment) result.push(segment);
                lastIndex = endIdx;
            }
            if (lastIndex < text.length) {
                const remaining = text.substring(lastIndex).trim();
                if (remaining) result.push(remaining);
            }
            if (result.length === 0 && text.trim().length > 0) {
                result = [text.trim()];
            }
            return result;
        }

        // 初始化示例
        function setExample() {
            setInputText(EXAMPLE_TEXT);
            colsPerPageInput.value = EXAMPLE_COLS_PER_PAGE;
            punctModeCheck.checked = true;
            convert();
        }

        // 简化的后备编码检测（当 jschardet 不可用时）
        function fallbackDetectEncoding(uint8Array) {
            // 检查 UTF-8 BOM
            if (uint8Array.length >= 3 && uint8Array[0] === 0xEF && uint8Array[1] === 0xBB && uint8Array[2] === 0xBF) {
                return 'utf-8';
            }
            return 'utf-8';
        }

        // 安全的编码检测函数
        function detectEncoding(uint8Array) {
            // 检查 jschardet 是否可用
            if (typeof jschardet !== 'undefined' && jschardet.detect) {
                try {
                    const detection = jschardet.detect(uint8Array);
                    if (detection && detection.encoding && detection.confidence > 0.3) {
                        const encoding = detection.encoding.toLowerCase();
                        // 映射到 TextDecoder 支持的名称
                        const map = {
                            'utf-8': 'utf-8',
                            'utf8': 'utf-8',
                            'gb2312': 'gb18030',
                            'gbk': 'gb18030',
                            'gb18030': 'gb18030',
                            'big5': 'big5',
                            'euc-kr': 'euc-kr',
                            'shift-jis': 'shift-jis',
                            'windows-1252': 'windows-1252'
                        };
                        return map[encoding] || 'utf-8';
                    }
                } catch (e) {
                    console.warn('jschardet 检测失败', e);
                }
            }
            // 后备
            return fallbackDetectEncoding(uint8Array);
        }

        // 使用检测到的编码解码（带 fatal: false 自动乱码检测）
        function decodeWithDetectedEncoding(arrayBuffer) {
            const uint8Array = new Uint8Array(arrayBuffer);

            // 第一步：用 fatal: false 尝试 UTF-8，检查是否产生替代字符（U+FFFD）
            let content = null;
            try {
                content = new TextDecoder('utf-8', { fatal: false }).decode(uint8Array);
            } catch (e) {}
            
            // 如果检测到替代字符，说明原文件不是 UTF-8，改用 GB18030/GBK
            const hasReplacementChar = content && /\uFFFD/.test(content);
            if (hasReplacementChar) {
                const gbkCandidates = ['gb18030', 'gbk'];
                for (const enc of gbkCandidates) {
                    try {
                        const text = new TextDecoder(enc).decode(uint8Array);
                        return text;
                    } catch (err) {
                        console.warn(`尝试使用编码 ${enc} 解码失败`, err);
                    }
                }
            }
            
            // 如果是纯 UTF-8 且没有乱码，直接返回
            if (content && !hasReplacementChar) {
                return content;
            }

            // 备用：尝试检测的编码
            const detected = detectEncoding(uint8Array) || 'utf-8';
            const candidates = [];
            if (detected && detected !== 'utf-8') candidates.push(detected);
            if (!candidates.includes('gb18030')) candidates.push('gb18030');
            
            for (const enc of candidates) {
                try {
                    const text = new TextDecoder(enc).decode(uint8Array);
                    return text;
                } catch (err) {
                    console.warn(`尝试使用编码 ${enc} 解码失败`, err);
                }
            }

            // 最后尝试 iso-8859-1
            try {
                return new TextDecoder('iso-8859-1').decode(uint8Array);
            } catch (e) {
                let s = '';
                for (let i = 0; i < uint8Array.length; i++) s += String.fromCharCode(uint8Array[i]);
                return s;
            }
        }

        // 创建并返回一个解码 Worker（如果支持）
        function createDecodeWorker() {
            if (typeof Worker === 'undefined') return null;
            const code = `onmessage = function(e) {
                try {
                    const ab = e.data.buffer;
                    const uint8 = new Uint8Array(ab);
                    
                    // 第一步：用 fatal: false 尝试 UTF-8
                    let content = null;
                    try {
                        content = new TextDecoder('utf-8', { fatal: false }).decode(uint8);
                    } catch (err) {}
                    
                    // 检查是否有替代字符（乱码标志）
                    const hasReplacementChar = content && /\uFFFD/.test(content);
                    if (hasReplacementChar) {
                        // 尝试 GB18030/GBK
                        const gbkList = ['gb18030', 'gbk'];
                        for (let i = 0; i < gbkList.length; i++) {
                            try {
                                const text = new TextDecoder(gbkList[i]).decode(uint8);
                                postMessage({text: text});
                                return;
                            } catch (err) {}
                        }
                    }
                    
                    // 如果 UTF-8 正常（无乱码），返回它
                    if (content && !hasReplacementChar) {
                        postMessage({text: content});
                        return;
                    }
                    
                    // 备用尝试
                    const detected = e.data.detected || 'utf-8';
                    const candidates = [];
                    if (detected && detected !== 'utf-8') candidates.push(detected);
                    if (!candidates.includes('gb18030')) candidates.push('gb18030');
                    
                    for (let i = 0; i < candidates.length; i++) {
                        try {
                            const text = new TextDecoder(candidates[i]).decode(uint8);
                            postMessage({text: text});
                            return;
                        } catch (err) {}
                    }
                    
                    try {
                        postMessage({text: new TextDecoder('iso-8859-1').decode(uint8)});
                        return;
                    } catch (err) {}
                    
                    let s = '';
                    for (let j = 0; j < uint8.length; j++) s += String.fromCharCode(uint8[j]);
                    postMessage({text: s});
                } catch (err) {
                    postMessage({error: err && err.message ? err.message : String(err)});
                }
            };`;
            const blob = new Blob([code], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            try {
                const w = new Worker(url);
                return w;
            } catch (e) {
                console.warn('无法创建 Worker', e);
                return null;
            }
        }

        const decodeWorker = createDecodeWorker();

        // 读取文件并自动检测编码（包含大小限制和错误处理）
        async function readFileWithAutoEncoding(file) {
            if (file.size > MAX_FILE_SIZE) {
                throw new Error(`文件过大（超过 ${MAX_FILE_SIZE/1024/1024}MB），请选择较小的文件。`);
            }
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const arrayBuffer = e.target.result;
                        const uint8Array = new Uint8Array(arrayBuffer);
                        const forced = (document.getElementById('encodingSelect') || {}).value || 'auto';
                        const detected = (forced === 'auto') ? detectEncoding(uint8Array) : forced;

                        // 如果有 Worker，就用 Worker 后台解码
                        if (decodeWorker) {
                            const onmsg = function(evt) {
                                if (evt.data && evt.data.text !== undefined) {
                                    resolve(evt.data.text);
                                } else if (evt.data && evt.data.error) {
                                    reject(new Error(evt.data.error));
                                } else {
                                    reject(new Error('解码失败'));
                                }
                                decodeWorker.removeEventListener('message', onmsg);
                            };
                            decodeWorker.addEventListener('message', onmsg);
                            try {
                                // 传递可转移的 ArrayBuffer
                                decodeWorker.postMessage({buffer: arrayBuffer, detected: detected}, [arrayBuffer]);
                            } catch (err) {
                                // 某些浏览器在转移后会将 arrayBuffer 置为 neutered，退回到主线程解码
                                try {
                                    const text = decodeWithDetectedEncoding(arrayBuffer);
                                    resolve(text);
                                } catch (ee) {
                                    reject(ee);
                                }
                            }
                            return;
                        } else {
                            const text = decodeWithDetectedEncoding(arrayBuffer);
                            resolve(text);
                        }
                    } catch (err) {
                        reject(new Error(`解码失败：${err.message}`));
                    }
                };
                reader.onerror = function() {
                    reject(new Error('文件读取失败'));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) {
                fileInfo.innerText = '未选择文件';
                return;
            }
            fileInfo.innerText = file.name;
            fileError.style.display = 'none';
            loadingMsg.style.display = 'block';
            loadingMsg.textContent = '⏳ 正在解码文件，请稍候...';
            convertBtn.disabled = true;
            exampleBtn.disabled = true;
            try {
                const content = await readFileWithAutoEncoding(file);
                setInputText(content);
                convert(); // 自动转换
            } catch (err) {
                fileError.textContent = `❌ ${err.message}`;
                fileError.style.display = 'block';
            } finally {
                loadingMsg.style.display = 'none';
                convertBtn.disabled = false;
                exampleBtn.disabled = false;
            }
        });

        clearFileBtn.addEventListener('click', function() {
            fileInput.value = '';
            fileInfo.innerText = '未选择文件';
            fileError.style.display = 'none';
            setInputText('');
        });

        // HTML 转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 转换核心（添加异常保护）
        function convert() {
            try {
                let rawText = getInputText();
                let colsPerPage = parseInt(colsPerPageInput.value, 10);
                if (isNaN(colsPerPage) || colsPerPage < 1) colsPerPage = 18;
                colsPerPageInput.value = colsPerPage;

                const paragraphMode = paragraphModeCheck.checked;
                const punctMode = punctModeCheck.checked;

                const rawTextTrimmed = rawText.trim();
                if (rawTextTrimmed.length === 0) {
                    outputDiv.innerHTML = '<div style="padding: 30px; text-align: center; color: #aaa;">⛔ 没有输入文字</div>';
                    paginationDiv.style.display = 'none';
                    return;
                }

                // 分割成片段，每个片段是一个字符数组
                let segments;
                if (paragraphMode) {
                    segments = splitByParagraph(rawTextTrimmed).map(p => Array.from(p));
                } else if (punctMode) {
                    const filteredText = rawTextTrimmed.replace(/[\n\r\t]/g, '');
                    segments = splitByPunctuation(filteredText).map(s => Array.from(s));
                } else {
                    const filteredText = rawTextTrimmed.replace(/[\n\r\t]/g, '');
                    segments = Array.from(filteredText).map(c => [c]); // 逐字分列
                }

                if (segments.length === 0) {
                    outputDiv.innerHTML = '<div style="padding: 30px; text-align: center; color: #aaa;">⛔ 没有有效内容</div>';
                    paginationDiv.style.display = 'none';
                    return;
                }

                const totalSegments = segments.length;
                const pageSize = colsPerPage;
                const pageCount = Math.ceil(totalSegments / pageSize);
                pages = [];

                for (let p = 0; p < pageCount; p++) {
                    const start = p * pageSize;
                    const end = Math.min(start + pageSize, totalSegments);
                    const pageSegments = segments.slice(start, end);
                    pages.push(pageSegments);
                }

                currentPage = 0;
                renderPage(currentPage);
                updatePaginationControls();

                paginationDiv.style.display = 'flex';
                totalPagesSpan.innerText = pageCount;
                currentPageSpan.innerText = currentPage + 1;
                pageStats.innerText = `总片段 ${totalSegments}  · 共 ${pageCount} 页`;
            } catch (e) {
                console.error('转换错误', e);
                outputDiv.innerHTML = `<div style="padding:30px; text-align:center;color:#b34a4a;">❌ 排版时发生错误：${e.message}</div>`;
                paginationDiv.style.display = 'none';
            }
        }

        function renderPage(pageIndex) {
            try {
                if (!pages.length || pageIndex < 0 || pageIndex >= pages.length) {
                    outputDiv.innerHTML = '<div style="padding:30px; text-align:center;color:#aaa;">无页面</div>';
                    currentPageInfo.innerText = '';
                    return;
                }

                const pageSegments = pages[pageIndex];

                let columnsHtml = '';
                for (let i = 0; i < pageSegments.length; i++) {
                    const segmentChars = pageSegments[i];
                    let columnContent = '';
                    for (let j = 0; j < segmentChars.length; j++) {
                        // 修复：直接调用 escapeHtml，而不是 this.escapeHtml
                        columnContent += `<div class="cell">${escapeHtml(segmentChars[j])}</div>`;
                    }
                    columnsHtml += `<div class="column">${columnContent}</div>`;
                }

                // 生成列号标记（从右向左编号）
                let headerHtml = '';
                for (let i = pageSegments.length - 1; i >= 0; i--) {
                    const colNumber = pageSegments.length - i; // 最右边为1
                    headerHtml += `<div style="text-align:center; font-size:0.9rem; color:#8f7f6e; min-width:2.5em;">⬇️列${colNumber}</div>`;
                }

                outputDiv.innerHTML = `
                    <div style="display: flex; flex-direction: column;">
                        <div style="display: flex; flex-direction: row-reverse; margin-bottom: 8px;">
                            ${headerHtml}
                        </div>
                        <div class="columns-container">
                            ${columnsHtml}
                        </div>
                    </div>
                `;

                const startSegment = pageIndex * parseInt(colsPerPageInput.value, 10) + 1;
                const endSegment = Math.min(startSegment + pageSegments.length - 1, pages.length * parseInt(colsPerPageInput.value, 10));
                currentPageInfo.innerText = `第 ${pageIndex+1} 页 · 片段 ${startSegment}–${endSegment}`;
            } catch (e) {
                console.error('渲染错误', e);
                outputDiv.innerHTML = `<div style="padding:30px; text-align:center;color:#b34a4a;">❌ 渲染页面时发生错误：${e.message}</div>`;
            }
        }

        function updatePaginationControls() {
            if (!pages.length) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }
            currentPageSpan.innerText = currentPage + 1;
            totalPagesSpan.innerText = pages.length;
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === pages.length - 1);
        }

        prevBtn.addEventListener('click', function() {
            if (currentPage > 0) {
                currentPage--;
                renderPage(currentPage);
                updatePaginationControls();
            }
        });

        nextBtn.addEventListener('click', function() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                renderPage(currentPage);
                updatePaginationControls();
            }
        });

        // 左右方向键控制翻页
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' && currentPage > 0) {
                e.preventDefault();
                currentPage--;
                renderPage(currentPage);
                updatePaginationControls();
            } else if (e.key === 'ArrowRight' && currentPage < pages.length - 1) {
                e.preventDefault();
                currentPage++;
                renderPage(currentPage);
                updatePaginationControls();
            }
        });

        convertBtn.addEventListener('click', convert);
        exampleBtn.addEventListener('click', setExample);

        window.addEventListener('load', setExample);
    })();
</script>
</body>
</html>
